# Set programs
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun

env = XCURSOR_THEME,Volantes_Light
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force GTK4 to use native Wayland backend (prevents XWayland fallback which breaks layer shell input)
env = GDK_BACKEND,wayland

# Electron / Chromium Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
